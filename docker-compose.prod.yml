x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-prod}
  APP_CONFIG_PATH: ${APP_CONFIG_PATH:-/config/app.yaml}
  STRATEGY_CONFIG_PATH: ${STRATEGY_CONFIG_PATH:-/config/strategy.yaml}
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
  CODEX_API_KEY: ${CODEX_API_KEY:?CODEX_API_KEY is required}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
  DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
  DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-8}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_EXPIRES_DAYS: ${JWT_EXPIRES_DAYS:-7}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  API_BIND_HOST: ${API_BIND_HOST:-127.0.0.1}
  API_PORT: ${API_PORT:-8000}

x-backend-service: &backend-service
  build: ./backend
  environment: *backend-env
  volumes:
    - ./config:/config:ro
  network_mode: host
  restart: unless-stopped

services:
  api:
    <<: *backend-service
    command: sh -c 'uvicorn app.main:app --host "$${API_BIND_HOST}" --port "$${API_PORT}"'

  worker-ingest:
    <<: *backend-service
    command: python -m app.workers.ingest

  worker-signal:
    <<: *backend-service
    command: python -m app.workers.signal

  worker-paper:
    <<: *backend-service
    command: python -m app.workers.paper_mark

  worker-resolution:
    <<: *backend-service
    command: python -m app.workers.resolution

  worker-usage:
    <<: *backend-service
    command: python -m app.workers.usage
