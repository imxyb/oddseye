x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-prod}
  APP_CONFIG_PATH: ${APP_CONFIG_PATH:-/config/app.yaml}
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
  CODEX_API_KEY: ${CODEX_API_KEY:?CODEX_API_KEY is required}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_EXPIRES_DAYS: ${JWT_EXPIRES_DAYS:-7}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-backend-service: &backend-service
  build: ./backend
  environment: *backend-env
  volumes:
    - ./config:/config:ro
  network_mode: host
  restart: unless-stopped

services:
  api:
    <<: *backend-service
    command: uvicorn app.main:app --host 127.0.0.1 --port 8000

  worker-ingest:
    <<: *backend-service
    command: python -m app.workers.ingest

  worker-signal:
    <<: *backend-service
    command: python -m app.workers.signal

  worker-paper:
    <<: *backend-service
    command: python -m app.workers.paper_mark

  worker-resolution:
    <<: *backend-service
    command: python -m app.workers.resolution

  worker-usage:
    <<: *backend-service
    command: python -m app.workers.usage
