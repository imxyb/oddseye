crypto_threshold_v1:
  enabled: false

crypto_threshold_v2:
  enabled: true
  mode: auto_simulated
  legacy_v1_enabled: false
  supported_assets:
    - BTC
    - ETH
    - SOL
  venue_allowlist:
    - POLYMARKET
  parser:
    min_confidence: 0.85
    touch_min_confidence: 0.90
    block_on_ambiguity: true
  edge:
    min_exec_edge: 0.06
    min_stress_edge: 0.025
    touch_min_exec_edge: 0.08
    touch_min_stress_edge: 0.04
    max_spread_ct: 0.04
  sizing:
    starting_equity: 10000
    min_notional: 5
    default_paper_notional_cap: 100
    kelly_fraction: 0.20
    max_position_pct: 0.01
  paper_execution:
    use_bid_ask: true
    auto_execute_signals: true
    require_top_of_book_depth: true
  real_execution:
    enabled: false

macro_calendar_v1:
  enabled: true
  mode: observe_and_manual_paper_only
