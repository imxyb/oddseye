app:
  name: prediction-radar
  timezone: Asia/Singapore
  base_currency: USDC

auth:
  users:
    - username: admin
      password_hash: "$2b$12$replace_with_bcrypt_hash"
      role: admin
  token_expires_days: 7

codex:
  endpoint: "https://graph.codex.io/graphql"
  timeout_seconds: 20
  max_retries: 3
  usage_tracking_enabled: true
  usage_policy: advisory_only
  global_monthly_reference_budget: 1000000
  external_daily_usage_estimate: 12000
  radar_daily_target_requests: 8000
  radar_daily_review_threshold: 10000
  radar_monthly_review_threshold: 300000
  fetch_profile: light

radar:
  enabled_categories:
    - crypto
    - economics
    - finance
  protocols:
    - POLYMARKET
  min_liquidity_usd: 1000
  min_volume_usd_24h: 500
  max_spread_ct: 0.08
  max_markets_per_ingest: 300

paper:
  starting_cash: 10000
  currency: USDC
  fee_bps: 0
  slippage_bps: 25
  max_position_pct: 0.03
  max_market_risk_pct: 0.05
  max_daily_loss_pct: 0.03
  max_category_exposure_pct: 0.15
  allow_short: false

jobs:
  categories_refresh_cron: "0 3 * * *"
  market_discovery_seconds: 300
  hot_market_snapshot_seconds: 60
  warm_market_snapshot_seconds: 60
  cold_market_snapshot_seconds: 600
  signal_seconds: 120
  paper_mark_seconds: 60
  resolution_poll_seconds: 7200

ingestion_tiers:
  hot_watchlist_max_markets: 30
  warm_pool_max_markets: 120
  cold_pool_max_markets: 500
  bars_fetch_mode: on_demand
  manual_refresh_enabled: true

strategies:
  crypto_threshold_v2:
    enabled: true
    mode: paper_only
    legacy_v1_enabled: false
    supported_assets:
      - BTC
      - ETH
      - SOL
    market_types:
      - close_above
      - close_below
      - hit_above
      - hit_below
      - range_close
    venue_allowlist:
      - POLYMARKET
    parser:
      min_confidence: 0.85
      touch_min_confidence: 0.90
      block_on_ambiguity: true
    market_filters:
      min_quality_score: 70
      touch_min_quality_score: 75
      min_hours_to_close: 2
      max_days_to_close: 21
      block_extreme_prices: true
      min_trade_price: 0.03
      max_trade_price: 0.97
    data_freshness:
      spot_seconds: 30
      orderbook_seconds: 15
      market_snapshot_seconds: 300
      asset_snapshot_cache_seconds: 20
    edge:
      min_exec_edge: 0.06
      min_stress_edge: 0.025
      touch_min_exec_edge: 0.08
      touch_min_stress_edge: 0.04
      max_spread_ct: 0.04
      uncertainty_penalty_multiplier: 1.0
    sizing:
      starting_equity: 10000
      min_notional: 5
      default_paper_notional_cap: 100
      kelly_fraction: 0.20
      max_position_pct: 0.01
      max_event_exposure_pct: 0.02
      max_asset_exposure_pct: 0.04
      max_asset_horizon_exposure_pct: 0.025
      max_category_exposure_pct: 0.15
      max_daily_new_risk_pct: 0.02
      depth_multiplier: 1.5
    exits:
      stale_data_exit_enabled: true
      parser_block_exit_enabled: true
      asset_data_unavailable_exit_enabled: true
    paper_execution:
      use_bid_ask: true
      auto_execute_signals: true
      max_asset_horizon_positions: 2
      price_slippage_ct: 0.0025
      require_top_of_book_depth: true
    real_execution:
      enabled: false
      require_manual_approval: true
      max_order_notional: 10
      order_ttl_seconds: 30
      time_in_force: FAK
  macro_calendar_v1:
    enabled: true
    mode: observe_and_manual_paper_only
